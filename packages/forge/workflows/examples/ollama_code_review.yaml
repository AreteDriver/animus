# Ollama Code Review Pipeline
# Runs entirely on local Ollama — no API keys needed.
#
# Prerequisites:
#   - Ollama running: ollama serve
#   - Model pulled: ollama pull deepseek-coder-v2
#
# Usage:
#   animus-forge run workflows/examples/ollama_code_review.yaml \
#     --var target_path=./src

name: ollama_code_review
description: Local code review pipeline using Ollama

inputs:
  target_path:
    type: string
    default: ./src
    description: Path to the code to review

steps:
  # Step 0: Read actual file contents from disk
  - id: read_code
    type: shell
    params:
      command: "find ${target_path} -name '*.py' -type f | sort | head -20 | xargs head -100"
    outputs:
      - code_content

  - id: analyze_structure
    type: ollama
    depends_on:
      - read_code
    params:
      prompt: >
        Analyze the code structure of these Python files.
        List the main modules, their responsibilities, and key classes.
        Be concise and factual.

        Code:
        ${code_content}
      system_prompt: >
        You are a senior software architect. Analyze codebases for structure,
        patterns, and organization. Output structured analysis.
      estimated_tokens: 2000
    outputs:
      - structure_analysis

  - id: review_quality
    type: ollama
    depends_on:
      - analyze_structure
    params:
      prompt: >
        Given this structure analysis:
        ${structure_analysis}

        And the actual code:
        ${code_content}

        Review for quality issues:
        1. Naming conventions
        2. Error handling patterns
        3. Test coverage gaps
        4. Potential security concerns
        Be specific and actionable.
      system_prompt: >
        You are a code reviewer. Focus on correctness, security,
        and maintainability. Be direct and specific.
      estimated_tokens: 3000
    depends_on:
      - read_code
    outputs:
      - review_findings

  - id: summarize
    type: ollama
    depends_on:
      - review_quality
    params:
      prompt: >
        Summarize this code review into a brief report:

        Structure: ${structure_analysis}
        Findings: ${review_findings}

        Format as: Executive Summary, Top Issues (max 5), Recommendations.
      system_prompt: You are a technical writer. Be concise and clear.
      estimated_tokens: 1500
    outputs:
      - final_report

outputs:
  - final_report
