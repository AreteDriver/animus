name: Autopsy Analysis
version: "1.0"
description: Post-failure forensics — analyze error text and produce recommendations

inputs:
  error_text:
    type: string
    required: true
    description: Error output or traceback to analyze
  workflow_id:
    type: string
    required: false
    default: ""
    description: ID of the failed workflow (for correlation)

outputs:
  - autopsy_result
  - ai_summary

steps:
  - id: analyze
    type: autopsy_analyze
    params:
      error_text: "${error_text}"
      workflow_id: "${workflow_id}"
    outputs:
      - autopsy_result

  - id: summarize
    type: claude_code
    depends_on: [analyze]
    params:
      role: reviewer
      prompt: |
        Summarize this failure analysis for an engineer:

        Failure type: ${autopsy_result.failure_type}
        Error chain: ${autopsy_result.error_chain}
        Recommendations: ${autopsy_result.recommendations}
        Loops detected: ${autopsy_result.loops_detected}

        Provide a 2-3 sentence summary with the most important action item.
      estimated_tokens: 2000
    outputs:
      - ai_summary
