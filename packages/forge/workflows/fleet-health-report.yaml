# Fleet Health Report — Daily summary of all services
# Run via cron or manually for a fleet-wide health snapshot
#
# Checks all services, summarizes uptime, flags concerns

name: fleet-health-report
version: 1.0.0
description: Generate a daily health report across all fleet services
tags: [fleet, ops, reporting]

inputs:
  output_file:
    type: string
    description: Where to write the report
    default: "/home/arete/.animus/fleet_reports/daily.md"

timeout_seconds: 120
estimated_tokens: 1000

steps:
  - id: check_all
    type: shell
    description: Hit all health endpoints and collect status
    command: |
      SERVICES=(
        "BenchGoblins API|https://backend.benchgoblins.com/health"
        "BenchGoblins Web|https://benchgoblins.com"
        "Gatekeeper API|https://edengk.com/api/health"
        "Gatekeeper Web|https://edengk.com"
        "Monolith API|https://monolith-evefrontier.fly.dev/api/v1/health"
        "WatchTower API|https://watchtower-evefrontier.fly.dev/health"
        "Frontier Tribe OS|https://frontier-tribe-os.fly.dev/health"
        "AI Cards Mint|https://aicards-mint.fly.dev/health"
        "StayCards Mint|https://staycards-mint.fly.dev/health"
        "License Server|https://cmdf-license.fly.dev/v1/health"
      )

      echo "# Fleet Health Report — $(date '+%Y-%m-%d %H:%M')"
      echo ""
      echo "| Service | Status | Response |"
      echo "|---------|--------|----------|"

      for entry in "${SERVICES[@]}"; do
        IFS='|' read -r name url <<< "$entry"
        START=$(date +%s%N)
        CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url" 2>/dev/null || echo "000")
        END=$(date +%s%N)
        MS=$(( (END - START) / 1000000 ))

        if [ "$CODE" = "200" ]; then
          STATUS="UP"
        elif [ "$CODE" = "000" ]; then
          STATUS="DOWN"
        else
          STATUS="DEGRADED ($CODE)"
        fi

        echo "| $name | $STATUS | ${MS}ms |"
      done

      echo ""
      echo "---"
      echo "Generated by Animus Fleet Health Report"
    timeout_seconds: 60

  - id: check_pending_alerts
    type: shell
    description: Check for any unresolved alert tasks
    command: |
      if [ -f /home/arete/.animus/fleet_alerts/active_alerts.json ]; then
        ACTIVE=$(python3 -c "import json; d=json.load(open('/home/arete/.animus/fleet_alerts/active_alerts.json')); print(len(d))")
        echo "Active alerts: $ACTIVE"
        cat /home/arete/.animus/fleet_alerts/active_alerts.json
      else
        echo "Active alerts: 0"
      fi
    timeout_seconds: 5
    on_failure: skip

  - id: save_report
    type: shell
    description: Save the report to file
    depends_on: [check_all]
    command: |
      mkdir -p /home/arete/.animus/fleet_reports
      cat << 'REPORT' > "${output_file}"
      ${check_all}

      ## Active Alerts
      ${check_pending_alerts}
      REPORT
      echo "Report saved to ${output_file}"
    timeout_seconds: 5
    on_failure: skip

outputs:
  - check_all
  - check_pending_alerts
